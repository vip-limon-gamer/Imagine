<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMAGINE AI - Neural Image Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff006e;
            --neon-cyan: #00f5ff;
            --neon-purple: #bf00ff;
            --dark-bg: #0a0a0f;
            --card-bg: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #b4b4c8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Mono', monospace;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        header { text-align: center; margin-bottom: 60px; }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.2rem, 8vw, 4rem);
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
            letter-spacing: 2px;
        }

        .generator-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(0, 245, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        textarea {
            width: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(0, 245, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            margin-bottom: 20px;
            outline: none;
            min-height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            border: none;
            border-radius: 50px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon-pink); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .loading { display: none; text-align: center; margin-top: 30px; }
        .spinner { 
            width: 50px; height: 50px; 
            border: 5px solid rgba(0, 245, 255, 0.1); 
            border-top: 5px solid var(--neon-cyan); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 15px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result { margin-top: 40px; display: none; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .result img { 
            width: 100%; 
            border-radius: 15px; 
            border: 2px solid var(--neon-cyan); 
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
        }
        
        .download-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--neon-cyan);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid var(--neon-cyan);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>IMAGINE AI</h1>
            <p style="color: var(--text-secondary); letter-spacing: 3px;">NEURAL ART ENGINE</p>
        </header>

        <div class="generator-card">
            <textarea id="prompt" placeholder="Describe your creative vision here..."></textarea>
            <button id="generateBtn">Generate Magic</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="color: var(--neon-cyan)">Processing Neural Grid...</p>
            </div>
        </div>

        <div class="result" id="result">
            <h3 style="color: var(--neon-pink); margin-bottom: 15px;">Output Result:</h3>
            <img id="outputImage" src="" alt="AI Generated Image">
            <a id="downloadBtn" href="#" target="_blank" class="download-link">Download High Quality</a>
        </div>
    </div>

    <script>
        const promptInput = document.getElementById('prompt');
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const outputImg = document.getElementById('outputImage');
        const downloadBtn = document.getElementById('downloadBtn');

        generateBtn.addEventListener('click', () => {
            const promptValue = promptInput.value.trim();
            if (!promptValue) {
                alert("Please enter a prompt!");
                return;
            }

            // UI Reset
            loading.style.display = 'block';
            resultDiv.style.display = 'none';
            generateBtn.disabled = true;

            // Image Generation Logic (Direct & Fast)
            const seed = Math.floor(Math.random() * 1000000);
            const imageUrl = `https://pollinations.ai/p/${encodeURIComponent(promptValue)}?width=1024&height=1024&seed=${seed}&nologo=true`;

            // ইমেজ লোড হওয়া পর্যন্ত ওয়েট করা
            const imgChecker = new Image();
            imgChecker.src = imageUrl;
            
            imgChecker.onload = () => {
                outputImg.src = imageUrl;
                downloadBtn.href = imageUrl;
                loading.style.display = 'none';
                resultDiv.style.display = 'block';
                generateBtn.disabled = false;
            };

            imgChecker.onerror = () => {
                alert("Generation failed. Please try again.");
                loading.style.display = 'none';
                generateBtn.disabled = false;
            };
        });
    </script>
</body>
</html>
